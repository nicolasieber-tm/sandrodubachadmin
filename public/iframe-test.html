<!doctype html>
<!--
  LOKALE Vorschau-Seite für das neue Buchungs-Overlay.
  Liegt in public/, wird vom Dev-Server unter http://localhost:3000/preview.html
  ausgeliefert (gleiche Origin → vom frame-ancestors-CSP erlaubt).
  Lädt /embed.js + /book vom LOKALEN Dev-Server, zeigt also das NEUE Design.
  → Vor einem Deploy wieder löschen (reines Test-Artefakt).
-->
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sandro Dubach Fotografie · Vorschau (lokal)</title>
  <style>
    :root { --ink:#1c2230; --mut:#6b7280; --accent:#dd6a23; --accent-2:#ec7d34; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 600px at 70% -10%, #fff4ec 0%, #ffffff 55%);
      min-height: 100dvh;
    }
    .badge {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      background: #1c2230; color: #fff; font-size: 12px; font-weight: 600;
      padding: 6px 11px; border-radius: 999px; letter-spacing: .02em;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px clamp(20px,6vw,64px); max-width: 1080px; margin: 0 auto;
    }
    .brand { font-weight: 700; } .brand span { color: var(--accent); }
    nav a { color: var(--mut); text-decoration: none; margin-left: 22px; font-size: 14px; }
    .hero { max-width: 1080px; margin: 0 auto; padding: clamp(32px,8vw,88px) clamp(20px,6vw,64px) 48px; }
    .eyebrow { text-transform: uppercase; letter-spacing: 2px; font-size: 12px; font-weight: 700; color: var(--accent); margin: 0 0 14px; }
    h1 { font-size: clamp(34px,6vw,56px); line-height: 1.05; margin: 0 0 18px; letter-spacing: -.5px; }
    .lead { font-size: clamp(16px,2.4vw,19px); color: var(--mut); max-width: 560px; margin: 0 0 32px; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px; padding: 15px 26px;
      border: 1px solid #c75f1f; border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: #fff; font-weight: 600; font-size: 16px; cursor: pointer;
      box-shadow: 0 10px 26px -10px rgba(199,95,31,.6);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .cta:hover { transform: translateY(-1px); box-shadow: 0 14px 30px -10px rgba(199,95,31,.7); }
  </style>
</head>
<body>
  <div class="badge">● LOKALE VORSCHAU · neues Design</div>

  <header>
    <div class="brand">Sandro Dubach <span>Fotografie</span></div>
    <nav><a href="#">Portfolio</a><a href="#">Über mich</a><a href="#">Kontakt</a></nav>
  </header>

  <section class="hero">
    <p class="eyebrow">Porträt · Hochzeit · Business</p>
    <h1>Momente, die bleiben.</h1>
    <p class="lead">Buche deinen Fototermin in unter einer Minute — direkt hier, ohne Telefon und ohne Wartezeit.</p>
    <button type="button" class="cta" data-sd-book>Termin buchen</button>
  </section>

  <!-- LOKALES Embed-Skript (gleiche Origin) → Overlay zeigt localhost:3000/book mit neuem Design -->
  <script src="/embed.js"></script>
</body>
</html>
