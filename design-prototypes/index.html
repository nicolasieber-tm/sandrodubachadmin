<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandro Dubach — Design-Ansätze</title>
<style>
  :root{
    --bg:#0c0d10; --panel:#15171c; --line:#262a31; --ink:#f3f5f8; --ink-2:#9aa3b0;
    --accent:#e3712a; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .title{display:flex;align-items:center;gap:12px;min-width:0}
  .title .mark{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
  .title h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .title p{font-size:12px;color:var(--ink-2);margin-top:1px}
  nav{display:flex;gap:6px;flex-wrap:wrap}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--ink-2);padding:9px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap}
  .tab:hover{color:var(--ink);border-color:#3a4049}
  .tab.active{background:#fff;color:#111;border-color:#fff;font-weight:600}
  .tab .n{width:18px;height:18px;border-radius:5px;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .tab.active .n{background:var(--accent);color:#fff}
  .actions{display:flex;gap:8px;align-items:center}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{border:none;background:none;color:var(--ink-2);padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit}
  .seg button.on{background:#2a2f37;color:var(--ink)}
  .open{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .open:hover{border-color:#3a4049}
  main{flex:1;position:relative;background:#1c1f25;overflow:hidden}
  .stage{position:absolute;inset:0;padding:18px}
  .frame-wrap{width:100%;height:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:0 20px 60px -20px rgba(0,0,0,.6)}
  iframe{width:100%;height:100%;border:none;display:block;background:#fff}
  /* grid mode */
  .grid{position:absolute;inset:0;padding:18px;display:none;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px}
  body.grid-on .stage{display:none}
  body.grid-on .grid{display:grid}
  .cell{position:relative;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#fff;cursor:pointer}
  .cell .label{position:absolute;top:0;left:0;right:0;z-index:2;background:linear-gradient(180deg,rgba(8,9,11,.82),rgba(8,9,11,0));color:#fff;font-size:12px;font-weight:600;padding:8px 12px;display:flex;align-items:center;gap:8px;pointer-events:none}
  .cell .label .n{width:18px;height:18px;border-radius:5px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .cell .scaler{position:absolute;top:0;left:0;width:200%;height:200%;transform:scale(.5);transform-origin:top left;border:none;background:#fff}
  .cell:hover{border-color:var(--accent)}
  .hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(8,9,11,.8);border:1px solid var(--line);color:var(--ink-2);font-size:11.5px;padding:6px 12px;border-radius:999px;backdrop-filter:blur(6px)}
</style>
</head>
<body>
<header>
  <div class="title">
    <div class="mark">SD</div>
    <div><h1>Sandro Dubach · Adminbereich</h1><p>Design-Ansätze — wähle eine Richtung</p></div>
  </div>
  <nav id="nav"></nav>
  <div class="actions">
    <div class="seg"><button id="m-single" class="on" onclick="setMode('single')">Einzeln</button><button id="m-grid" onclick="setMode('grid')">Raster</button></div>
    <a class="open" id="openTab" href="#" target="_blank">↗ Vollbild</a>
  </div>
</header>
<main>
  <div class="stage"><div class="frame-wrap"><iframe id="frame" src=""></iframe></div></div>
  <div class="grid" id="grid"></div>
  <div class="hint" id="hint">Tipp: „Raster" zeigt alle vier gleichzeitig · Klick auf eine Kachel öffnet sie gross</div>
</main>
<script>
const DESIGNS=[
  {id:'atelier',  file:'01-atelier.html',   name:'Atelier',          sub:'Premium Editorial Light'},
  {id:'mono',     file:'02-monochrome.html',name:'Monochrome',       sub:'Swiss Minimal'},
  {id:'dark',     file:'03-studio-dark.html',name:'Studio Dark',     sub:'Modern Dark Pro'},
  {id:'refined',  file:'04-refined.html',   name:'Refined Original', sub:'aufpoliert'},
];
let current=0;
const nav=document.getElementById('nav');
DESIGNS.forEach((d,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===0?' active':'');
  b.innerHTML='<span class="n">'+(i+1)+'</span>'+d.name;
  b.title=d.sub;
  b.onclick=()=>select(i);
  nav.appendChild(b);
});
function select(i){
  current=i;
  document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('active',x===i));
  document.getElementById('frame').src=DESIGNS[i].file;
  document.getElementById('openTab').href=DESIGNS[i].file;
  setMode('single');
}
function setMode(m){
  document.body.classList.toggle('grid-on',m==='grid');
  document.getElementById('m-single').classList.toggle('on',m==='single');
  document.getElementById('m-grid').classList.toggle('on',m==='grid');
  document.getElementById('hint').style.display=m==='grid'?'block':'none';
}
const grid=document.getElementById('grid');
DESIGNS.forEach((d,i)=>{
  const c=document.createElement('div');
  c.className='cell';
  c.onclick=()=>select(i);
  c.innerHTML='<div class="label"><span class="n">'+(i+1)+'</span>'+d.name+' · '+d.sub+'</div><iframe class="scaler" src="'+d.file+'" loading="lazy"></iframe>';
  grid.appendChild(c);
});
select(0);
document.getElementById('hint').style.display='none';
</script>
</body>
</html>
